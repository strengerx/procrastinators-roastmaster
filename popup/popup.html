<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Procrastinator's Roastmaster</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="container">
        <h1>🚨 Procrastinator's Roastmaster</h1>

        <div id="stats-section">
            <h2>Today's Stats</h2>
            <div id="stats-content">
                <p>Loading stats...</p>
            </div>
        </div>

        <div id="roast-section">
            <h2>Random Roast</h2>
            <p id="roast-message">Click below for motivation!</p>
            <button id="get-roast">Roast Me!</button>
        </div>

        <div id="leaderboard-section">
            <h2>🏆 Shame Leaderboard</h2>
            <div id="leaderboard-content">
                <p>Loading leaderboard...</p>
            </div>
        </div>

        <div id="achievements-section">
            <h2>🏅 Achievements</h2>
            <div id="achievements-content">
                <p>Loading achievements...</p>
            </div>
        </div>

        <div id="actions-section">
            <button id="reset-stats">Reset Today's Stats</button>
            <button id="view-options">Settings</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
